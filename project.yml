# XcodeGen project definition.
#
# This repo intentionally does NOT commit a .xcodeproj (it is fragile and
# machine-generated). Generate it on your Mac with:
#
#     brew install xcodegen      # one-time
#     xcodegen generate
#     open BetterAskVoice.xcodeproj
#
# See README.md for the full build/run/test walkthrough.

name: BetterAskVoice

options:
  bundleIdPrefix: com.unevilgenius
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    # Leave empty so the project opens without a signing team; set your own in Xcode.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  BetterAskVoice:
    type: application
    platform: iOS
    sources:
      - path: BetterAskVoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unevilgenius.betteraskvoice
        INFOPLIST_FILE: BetterAskVoice/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  BetterAskVoiceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BetterAskVoiceTests
    # Depending on the app target makes XcodeGen wire TEST_HOST / BUNDLE_LOADER
    # automatically, so `@testable import BetterAskVoice` works under ⌘U.
    dependencies:
      - target: BetterAskVoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unevilgenius.betteraskvoice.tests

schemes:
  BetterAskVoice:
    build:
      targets:
        BetterAskVoice: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BetterAskVoiceTests
